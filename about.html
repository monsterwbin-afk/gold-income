<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            color: #ffd700;
            position: relative;
            background: linear-gradient(135deg, #1a0000 0%, #331a00 50%, #1a0000 100%);
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 80%, rgba(255,215,0,0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,149,0,0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(255,215,0,0.2) 0%, transparent 50%),
                radial-gradient(circle at 60% 60%, rgba(255,149,0,0.2) 0%, transparent 50%);
            pointer-events: none;
            z-index: -2;
            animation: backgroundGlow 15s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(#ffd700 1px, transparent 1px),
                radial-gradient(#ff9500 0.5px, transparent 0.5px);
            background-size: 50px 50px, 25px 25px;
            background-position: 0 0, 12.5px 12.5px;
            opacity: 0.1;
            pointer-events: none;
            z-index: -1;
            animation: float 20s linear infinite;
        }

        .bag-background {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }

        .bag-float {
            position: absolute;
            bottom: -120px;
            font-size: 3rem;
            opacity: 0;
            color: rgba(255, 215, 0, 0.9);
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            animation: riseBag 14s linear infinite;
        }

        .bag-float:nth-child(1) { left: 10%; animation-duration: 12s; animation-delay: 0s; }
        .bag-float:nth-child(2) { left: 30%; animation-duration: 15s; animation-delay: 3s; font-size: 2.5rem; }
        .bag-float:nth-child(3) { left: 60%; animation-duration: 13s; animation-delay: 5s; font-size: 3.2rem; }
        .bag-float:nth-child(4) { left: 80%; animation-duration: 16s; animation-delay: 8s; font-size: 2.8rem; }

        @keyframes riseBag {
            0% { transform: translateY(0) scale(0.8); opacity: 0; }
            10% { opacity: 0.8; }
            40% { opacity: 1; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-120vh) scale(1.1); opacity: 0; }
        }

        @keyframes backgroundGlow {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 0.5; }
        }

        @keyframes float {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50px); }
        }

        .lang-switch {
            position: absolute;
            top: 30px;
            left: 20px;
            background: linear-gradient(135deg, #ffd700, #ffed4a);
            border: 2px solid #ff9500;
            color: #1a1a2e;
            padding: 10px 20px;
            font-size: 1em;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.5);
        }

        .lang-switch:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.7);
            background: linear-gradient(135deg, #ffed4a, #ffd700);
        }

        .page-nav {
            position: absolute;
            top: 30px;
            right: 20px;
            display: flex;
            gap: 12px;
            z-index: 2;
        }

        .page-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            font-size: 0.95em;
            font-weight: bold;
            border-radius: 20px;
            background: rgba(255, 215, 0, 0.15);
            border: 1px solid rgba(255, 215, 0, 0.35);
            color: #ffd700;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .page-link:hover {
            background: rgba(255, 215, 0, 0.3);
            color: #1a1a2e;
        }

        .page-link.active {
            background: linear-gradient(135deg, #ffd700, #ffb700);
            color: #1a1a2e;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.5);
            border-color: #ff9500;
        }

        .about-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 120px 30px 60px;
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .about-card {
            width: 100%;
            max-width: 760px;
            background: rgba(28, 16, 0, 0.65);
            border: 2px solid rgba(255, 215, 0, 0.45);
            border-radius: 30px;
            padding: 40px 45px;
            box-shadow: 0 20px 60px rgba(255, 215, 0, 0.2);
            backdrop-filter: blur(12px);
            text-align: left;
        }

        .about-title {
            font-size: 2.5em;
            margin-bottom: 25px;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
        }

        .about-text {
            color: #ffd700;
            font-size: 1.1em;
            line-height: 1.8;
            text-shadow: 0 0 12px rgba(255, 215, 0, 0.3);
            margin-bottom: 15px;
        }

        .about-text strong {
            color: #fff;
        }

        .return-btn {
            margin-top: 30px;
            display: inline-block;
            background: linear-gradient(135deg, #ffd700, #ff9500);
            border: 2px solid #fff;
            color: #1a1a2e;
            padding: 14px 32px;
            border-radius: 30px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.35);
            text-decoration: none;
        }

        .return-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 215, 0, 0.5);
        }

        @media (max-width: 768px) {
            .about-card {
                padding: 30px 25px;
            }
            .about-title {
                font-size: 2em;
            }
            .about-text {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <button class="lang-switch" id="langSwitch">English</button>
    <div class="page-nav">
        <a class="page-link active" id="aboutNav" href="about.html">About</a>
        <a class="page-link" id="privacyNav" href="privacy.html">Privacy</a>
    </div>
    <div class="bag-background">
        <span class="bag-float">💰</span>
        <span class="bag-float">💰</span>
        <span class="bag-float">💰</span>
        <span class="bag-float">💰</span>
    </div>
    <div class="about-container">
        <div class="about-card">
            <h1 class="about-title" id="aboutTitle">关于我们</h1>
            <p class="about-text" id="aboutText1">在我的网站上，您可以免费使用此薪资计算和游玩金币小游戏，金币的掉落希望让你繁忙的工作中感受到愉悦，希望您能达到理想中的薪酬收入。</p>
            <p class="about-text" id="aboutText2">如果您对我的网页有任何疑问或建议，请随时通过 monster.wbin（at）gmail（dot）com 联系我，感谢您的使用。</p>
            <a class="return-btn" id="returnBtn" href="index.html">返回首页</a>
        </div>
    </div>
    <script>
        let currentLang = 'zh';
        const translations = {
            zh: {
                aboutTitle: '关于我们',
                aboutText1: '在我的网站上，您可以免费使用此薪资计算和游玩金币小游戏，金币的掉落希望让你繁忙的工作中感受到愉悦，希望您能达到理想中的薪酬收入。',
                aboutText2: '如果您对我的网页有任何疑问或建议，请随时通过 monster.wbin（at）gmail（dot）com 联系我，感谢您的使用。',
                returnBtn: '返回首页',
                langSwitch: 'English',
                aboutNav: '关于',
                privacyNav: '隐私'
            },
            en: {
                aboutTitle: 'About Us',
                aboutText1: 'On my website, you can freely use this salary calculator and play the gold coin mini-game. The falling gold coins hope to bring you joy amidst your busy work, and I hope you achieve your ideal salary income.',
                aboutText2: 'If you have any questions or suggestions about my website, please feel free to contact me at monster.wbin (at) gmail (dot) com. Thank you for using it.',
                returnBtn: 'Return Home',
                langSwitch: '中文',
                aboutNav: 'About',
                privacyNav: 'Privacy'
            }
        };

        function updateLanguageContent() {
            const t = translations[currentLang];
            document.getElementById('aboutTitle').textContent = t.aboutTitle;
            document.getElementById('aboutText1').textContent = t.aboutText1;
            document.getElementById('aboutText2').textContent = t.aboutText2;
            const aboutNav = document.getElementById('aboutNav');
            const privacyNav = document.getElementById('privacyNav');
            const returnBtn = document.getElementById('returnBtn');
            if (aboutNav) {
                aboutNav.href = `about.html?lang=${currentLang}`;
                aboutNav.textContent = t.aboutNav;
            }
            if (privacyNav) {
                privacyNav.href = `privacy.html?lang=${currentLang}`;
                privacyNav.textContent = t.privacyNav;
            }
            if (returnBtn) {
                returnBtn.textContent = t.returnBtn;
                returnBtn.href = `index.html?lang=${currentLang}`;
            }
            document.getElementById('langSwitch').textContent = t.langSwitch;
        }

        function switchLanguage() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            localStorage.setItem('preferredLang', currentLang);
            updateLanguageContent();
        }

        document.getElementById('langSwitch').addEventListener('click', switchLanguage);

        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const langParam = urlParams.get('lang');
            const savedLang = localStorage.getItem('preferredLang');
            if (langParam === 'zh' || langParam === 'en') {
                currentLang = langParam;
            } else if (savedLang === 'en') {
                currentLang = 'en';
            }
            updateLanguageContent();
        });
    </script>
</body>
</html>
