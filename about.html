<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于牛马金币计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            color: #ffd700;
            position: relative;
            background: linear-gradient(135deg, #1a0000 0%, #331a00 50%, #1a0000 100%);
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 80%, rgba(255,215,0,0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,149,0,0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(255,215,0,0.2) 0%, transparent 50%),
                radial-gradient(circle at 60% 60%, rgba(255,149,0,0.2) 0%, transparent 50%);
            pointer-events: none;
            z-index: -2;
            animation: backgroundGlow 15s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(#ffd700 1px, transparent 1px),
                radial-gradient(#ff9500 0.5px, transparent 0.5px);
            background-size: 50px 50px, 25px 25px;
            background-position: 0 0, 12.5px 12.5px;
            opacity: 0.1;
            pointer-events: none;
            z-index: -1;
            animation: float 20s linear infinite;
        }

        .bag-background {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }

        .bag-float {
            position: absolute;
            bottom: -120px;
            font-size: 3rem;
            opacity: 0;
            color: rgba(255, 215, 0, 0.9);
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            animation: riseBag 14s linear infinite;
        }

        .bag-float:nth-child(1) { left: 10%; animation-duration: 12s; animation-delay: 0s; }
        .bag-float:nth-child(2) { left: 30%; animation-duration: 15s; animation-delay: 3s; font-size: 2.5rem; }
        .bag-float:nth-child(3) { left: 60%; animation-duration: 13s; animation-delay: 5s; font-size: 3.2rem; }
        .bag-float:nth-child(4) { left: 80%; animation-duration: 16s; animation-delay: 8s; font-size: 2.8rem; }

        @keyframes riseBag {
            0% { transform: translateY(0) scale(0.8); opacity: 0; }
            10% { opacity: 0.8; }
            40% { opacity: 1; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-120vh) scale(1.1); opacity: 0; }
        }

        @keyframes backgroundGlow {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 0.5; }
        }

        @keyframes float {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50px); }
        }

        .lang-switch {
            position: absolute;
            top: 30px;
            left: 20px;
            background: linear-gradient(135deg, #ffd700, #ffed4a);
            border: 2px solid #ff9500;
            color: #1a1a2e;
            padding: 10px 20px;
            font-size: 1em;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.5);
        }

        .lang-switch:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.7);
            background: linear-gradient(135deg, #ffed4a, #ffd700);
        }

        .page-nav {
            position: absolute;
            top: 30px;
            right: 20px;
            display: flex;
            gap: 12px;
            z-index: 2;
        }

        .page-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            font-size: 0.95em;
            font-weight: bold;
            border-radius: 20px;
            background: rgba(255, 215, 0, 0.15);
            border: 1px solid rgba(255, 215, 0, 0.35);
            color: #ffd700;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .page-link:hover {
            background: rgba(255, 215, 0, 0.3);
            color: #1a1a2e;
        }

        .page-link.active {
            background: linear-gradient(135deg, #ffd700, #ffb700);
            color: #1a1a2e;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.5);
            border-color: #ff9500;
        }

        .about-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 120px 30px 60px;
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .about-card {
            width: 100%;
            max-width: 760px;
            background: rgba(28, 16, 0, 0.65);
            border: 2px solid rgba(255, 215, 0, 0.45);
            border-radius: 30px;
            padding: 40px 45px;
            box-shadow: 0 20px 60px rgba(255, 215, 0, 0.2);
            backdrop-filter: blur(12px);
            text-align: left;
        }

        .about-title {
            font-size: 2.5em;
            margin-bottom: 25px;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
        }

        .about-text {
            color: #ffd700;
            font-size: 1.1em;
            line-height: 1.8;
            text-shadow: 0 0 12px rgba(255, 215, 0, 0.3);
            margin-bottom: 15px;
        }

        .about-text strong {
            color: #fff;
        }

        .return-btn {
            margin-top: 30px;
            display: inline-block;
            background: linear-gradient(135deg, #ffd700, #ff9500);
            border: 2px solid #fff;
            color: #1a1a2e;
            padding: 14px 32px;
            border-radius: 30px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.35);
            text-decoration: none;
        }

        .return-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 215, 0, 0.5);
        }

        @media (max-width: 768px) {
            .about-card {
                padding: 30px 25px;
            }
            .about-title {
                font-size: 2em;
            }
            .about-text {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <button class="lang-switch" id="langSwitch">English</button>
    <div class="page-nav">
        <a class="page-link active" id="aboutNav" href="about.html">About</a>
        <a class="page-link" id="privacyNav" href="privacy.html">Privacy</a>
    </div>
    <div class="bag-background">
        <span class="bag-float">💰</span>
        <span class="bag-float">💰</span>
        <span class="bag-float">💰</span>
        <span class="bag-float">💰</span>
    </div>
    <div class="about-container">
        <div class="about-card">
            <h1 class="about-title" id="aboutTitle">关于牛马金币计算器</h1>
            <p class="about-text" id="aboutText1">这个网站诞生于一个灵魂拷问：<br>"我这一小时，到底值几个钱？"</p>
            <p class="about-text" id="aboutText2">算完之后，沉默了。<br>于是做了这个计算器，帮同样迷茫的牛马们算清自己的价码。</p>
            <p class="about-text" id="aboutText3">顺便做了个接金币小游戏，让金币从屏幕掉下来的时候，<br>至少那一刻，你是开心的。</p>
            <p class="about-text" id="aboutText4">希望你算完这笔账之后，<br>要么更清醒地搬砖，<br>要么更坚定地向前。</p>
            <p class="about-text" id="aboutText5">📮 想骂我、夸我、或者有Bug要报：<br>monster.wbin（at）gmail（dot）com<br>（邮件标题请写"牛马来信"，我会优先看）</p>
            <a class="return-btn" id="returnBtn" href="index.html">返回首页</a>
        </div>
    </div>
    <script>
        let currentLang = 'zh';
        const translations = {
            zh: {
                aboutTitle: '关于牛马金币计算器',
                aboutText1: '这个网站诞生于一个灵魂拷问：\n"我这一小时，到底值几个钱？"',
                aboutText2: '算完之后，沉默了。\n于是做了这个计算器，帮同样迷茫的牛马们算清自己的价码。',
                aboutText3: '顺便做了个接金币小游戏，让金币从屏幕掉下来的时候，\n至少那一刻，你是开心的。',
                aboutText4: '希望你算完这笔账之后，\n要么更清醒地搬砖，\n要么更坚定地向前。',
                aboutText5: '📮 想骂我、夸我、或者有Bug要报：\nmonster.wbin（at）gmail（dot）com\n（邮件标题请写"牛马来信"，我会优先看）',
                returnBtn: '返回首页',
                langSwitch: 'English',
                aboutNav: '关于',
                privacyNav: '隐私'
            },
            en: {
                aboutTitle: 'About Niuma Gold Calculator',
                aboutText1: 'This website was born from a soul-searching question:\n"How much is this hour of mine really worth?"',
                aboutText2: 'After calculating, I fell silent.\nSo I made this calculator to help fellow "niuma" (workhorses) figure out their true worth.',
                aboutText3: 'I also added a coin-catching mini-game.\nWhen gold coins fall from the screen,\nat least in that moment, you are happy.',
                aboutText4: 'I hope after calculating this bill,\nyou either work more clearly,\nor move forward more firmly.',
                aboutText5: '📮 Want to scold me, praise me, or report a bug:\nmonster.wbin (at) gmail (dot)com\n(Please write "Niuma Letter" in the email subject, I will prioritize it)',
                returnBtn: 'Return Home',
                langSwitch: '中文',
                aboutNav: 'About',
                privacyNav: 'Privacy'
            }
        };

        function updateLanguageContent() {
            const t = translations[currentLang];
            document.getElementById('aboutTitle').textContent = t.aboutTitle;
            document.getElementById('aboutText1').innerHTML = t.aboutText1.replace(/\n/g, '<br>');
            document.getElementById('aboutText2').innerHTML = t.aboutText2.replace(/\n/g, '<br>');
            document.getElementById('aboutText3').innerHTML = t.aboutText3.replace(/\n/g, '<br>');
            document.getElementById('aboutText4').innerHTML = t.aboutText4.replace(/\n/g, '<br>');
            document.getElementById('aboutText5').innerHTML = t.aboutText5.replace(/\n/g, '<br>');
            const aboutNav = document.getElementById('aboutNav');
            const privacyNav = document.getElementById('privacyNav');
            const returnBtn = document.getElementById('returnBtn');
            if (aboutNav) {
                aboutNav.href = `about.html?lang=${currentLang}`;
                aboutNav.textContent = t.aboutNav;
            }
            if (privacyNav) {
                privacyNav.href = `privacy.html?lang=${currentLang}`;
                privacyNav.textContent = t.privacyNav;
            }
            if (returnBtn) {
                returnBtn.textContent = t.returnBtn;
                returnBtn.href = `index.html?lang=${currentLang}`;
            }
            document.getElementById('langSwitch').textContent = t.langSwitch;
        }

        function switchLanguage() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            localStorage.setItem('preferredLang', currentLang);
            updateLanguageContent();
        }

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('langSwitch').addEventListener('click', switchLanguage);
            const urlParams = new URLSearchParams(window.location.search);
            const langParam = urlParams.get('lang');
            const savedLang = localStorage.getItem('preferredLang');
            if (langParam === 'zh' || langParam === 'en') {
                currentLang = langParam;
            } else if (savedLang === 'en') {
                currentLang = 'en';
            }
            updateLanguageContent();
        });
    </script>
</body>
</html>
