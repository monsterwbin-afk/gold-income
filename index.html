        // дҝқеӯҳиә«д»ҪеҚЎеӣҫзү?        async function saveIdentityCardImage() {
            const container = document.getElementById('identityCardImageContainer');
            container.style.display = 'block';
            container.style.left = '50%';
            container.style.top = '50%';
            container.style.transform = 'translate(-50%, -50%)';

            try {
                const canvas = await html2canvas(container, {
                    backgroundColor: '#1a1a2e',
                    scale: 2,
                    useCORS: true
                });

                const imageData = canvas.toDataURL('image/png');
                
                // жЈҖжөӢжҳҜеҗҰдёәз§»еҠЁз«?                const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                
                if (isMobile) {
                    // з§»еҠЁз«ҜпјҡиҪ¬жҚўдё?Blob е№¶е°қиҜ•дҪҝз”ЁеҺҹз”ҹеҲҶдә?дҝқеӯҳ
                    const byteString = atob(imageData.split(',')[1]);
                    const mimeType = 'image/png';
                    const ab = new ArrayBuffer(byteString.length);
                    const ia = new Uint8Array(ab);
                    for (let i = 0; i < byteString.length; i++) {
                        ia[i] = byteString.charCodeAt(i);
                    }
                    const blob = new Blob([ab], { type: mimeType });
                    
                    // е°қиҜ•дҪҝз”Ё Web Share API (Android)
                    if (navigator.share && navigator.canShare) {
                        const file = new File([blob], 'жҲ‘зҡ„зүӣй©¬иә«д»ҪеҚ?png', { type: mimeType });
                        if (navigator.canShare({ files: [file] })) {
                            try {
                                await navigator.share({
                                    files: [file],
                                    title: 'жҲ‘зҡ„зүӣй©¬иә«д»ҪеҚ?,
                                    text: 'еҝ«жқҘзңӢзңӢжҲ‘зҡ„зүӣй©¬ж®өдҪҚпј?
                                });
                                showNotification(currentLang === 'zh' ? 'рҹ“ё дҝқеӯҳжҲҗеҠҹпј? : 'рҹ“ё Saved successfully!');
                                closeIdentityShareModal();
                                container.style.display = 'none';
                                container.style.left = '-9999px';
                                container.style.top = '0';
                                container.style.transform = 'none';
                                return;
                            } catch (shareErr) {
                                // з”ЁжҲ·еҸ–ж¶ҲеҲҶдә«пјҢз»§з»ӯдҪҝз”Ёе…¶д»–ж–№еј?                                if (shareErr.name !== 'AbortError') {
                                    console.log('еҲҶдә«еҸ–ж¶ҲпјҢдҪҝз”ЁеӨҮз”Ёдҝқеӯҳж–№еј?);
                                }
                            }
                        }
                    }
                    
                    // еӨҮз”Ёж–№жЎҲпјҡдҪҝз”?a>ж ҮзӯҫдёӢиҪҪ
                    const link = document.createElement('a');
                    link.download = 'жҲ‘зҡ„зүӣй©¬иә«д»ҪеҚ?png';
                    link.href = URL.createObjectURL(blob);
                    link.click();
                    
                    // iOS Safari жҸҗзӨәз”ЁжҲ·й•ҝжҢүдҝқеӯҳ
                    if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                        showNotification(currentLang === 'zh' ? 'рҹ“ё еӣҫзүҮе·Із”ҹжҲҗпјҢиҜ·й•ҝжҢүеӣҫзүҮйҖүжӢ©"еӯҳеӮЁеӣҫеғҸ"' : 'рҹ“ё Image ready, long press to save');
                    } else {
                        showNotification(currentLang === 'zh' ? 'рҹ“ё еӣҫзүҮдҝқеӯҳжҲҗеҠҹпј? : 'рҹ“ё Image saved!');
                    }
                } else {
                    // PCз«ҜпјҡзӣҙжҺҘдёӢиҪҪ
                    const link = document.createElement('a');
                    link.download = 'жҲ‘зҡ„зүӣй©¬иә«д»ҪеҚ?png';
                    link.href = imageData;
                    link.click();
                    showNotification(currentLang === 'zh' ? 'рҹ“ё еӣҫзүҮдҝқеӯҳжҲҗеҠҹпј? : 'рҹ“ё Image saved successfully!');
                }
                
                closeIdentityShareModal();
            } catch (err) {
                console.error('з”ҹжҲҗеӣҫзүҮеӨұиҙҘ:', err);
                showNotification(currentLang === 'zh' ? 'вқ?еӣҫзүҮз”ҹжҲҗеӨұиҙҘпјҢиҜ·йҮҚиҜ•' : 'вқ?Failed to generate image');
            }

            container.style.display = 'none';
            container.style.left = '-9999px';
            container.style.top = '0';
            container.style.transform = 'none';
        }

        // е°ҸжёёжҲҸйҮ‘еёҒзұ»
        class GameCoin {
            constructor() {
                this.x = Math.random() * (window.innerWidth - 50) + 25;
                this.y = -30;
                this.radius = 12 + Math.random() * 8;
                this.speedY = Math.random() * 2 + 3;
                this.speedX = (Math.random() - 0.5) * 2;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                this.opacity = 1;
                this.caught = false;
            }

            update() {
                if (!this.caught) {
                    this.y += this.speedY;
                    this.x += this.speedX;
                    this.rotation += this.rotationSpeed;
                    this.speedY += 0.05; // йҮҚеҠӣеҠ йҖ?                    
                    // жЈҖжҹҘжҳҜеҗҰиў«е°ҸдәәжҺҘдҪҸ
                    if (this.checkCatcherCollision()) {
                        this.caught = true;
                        this.onCaught();
                    }
                    
                    // и¶…еҮәеұҸе№•еә•йғЁ
                    if (this.y > window.innerHeight + 50) {
                        this.opacity = 0;
                    }
                }
            }

            checkCatcherCollision() {
                const catcherContainer = document.getElementById('catcherContainer');
                const catcherRect = catcherContainer.getBoundingClientRect();
                
                // жЈҖжҹҘйҮ‘еёҒжҳҜеҗҰиҝӣе…Ҙе°Ҹдәәзҡ„жҺҘзҗғиҢғеӣҙпјҲзҜ®еӯҗеҢәеҹҹпјү
                const basketCenterX = catcherRect.left + catcherRect.width / 2;
                const basketCenterY = catcherRect.bottom - 20;
                const catchRadius = 40;
                
                const distance = Math.sqrt(
                    Math.pow(this.x - basketCenterX, 2) + 
                    Math.pow(this.y - basketCenterY, 2)
                );
                
                return distance < catchRadius;
            }

            onCaught() {
                caughtCoinsCount++;
                document.getElementById('caughtCoinsCount').textContent = caughtCoinsCount;
                document.getElementById('caughtCoinsCounter').textContent = caughtCoinsCount;
                
                // жӣҙж–°з§°еҸ·жҳҫзӨә
                updateTitleDisplay();
                
                // ж’ӯж”ҫйҮ‘еёҒжҺҘдҪҸзҡ„еЈ°йҹ?                playCoinSound();
                
                // жҳҫзӨәжҺҘдҪҸйҮ‘еёҒзҡ„еҠЁз”»ж•Ҳжһ?                showCatchEffect(this.x, this.y);
                
                // жҳҫзӨәеҫ—еҲҶеј№зӘ—
                showScorePopup(this.x, this.y);
                
                // дёҙж—¶еҲҮжҚўеӣҫж Үе№¶и§ҰеҸ‘йҮ‘е…үж•Ҳжһ?                showTemporaryGoldenCharacter();
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.opacity;

                // з»ҳеҲ¶е°ҸжёёжҲҸйҮ‘её?                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.radius);
                gradient.addColorStop(0, '#ffed4a');
                gradient.addColorStop(0.6, '#ffd700');
                gradient.addColorStop(1, '#ff9500');

                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.strokeStyle = '#ff9500';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.fillStyle = '#ff9500';
                ctx.font = `bold ${this.radius * 0.8}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('ВҘ', 0, 0);

                ctx.restore();
            }
        }

        // ж’ӯж”ҫйҮ‘еёҒеЈ°йҹі
        function playCoinSound() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 800 + Math.random() * 400;
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.2);
        }

        // иҺ·еҸ–еҪ“еүҚз§°еҸ·пјҲж”ҜжҢҒеӨҡиҜӯиЁҖпј?        function getCurrentTitle(coinCount) {
            let titleKey = 'achievementIdle';
            for (const [threshold, key] of Object.entries(titles).sort((a, b) => parseInt(b[0]) - parseInt(a[0]))) {
                if (coinCount >= parseInt(threshold)) {
                    titleKey = key;
                    break;

            // ж №жҚ®еҪ“еүҚиҜӯиЁҖиҝ”еӣһеҜ№еә”зҡ„з§°еҸ?            const t = translations[currentLang];

        }

                achievementElement.className = 'game-achievement';

        function updateCurrentAchievementDisplay(coinCount) {
            const currentIcon = document.getElementById('currentAchievementIcon');
            const currentName = document.getElementById('currentAchievementName');
            const currentCoins = document.getElementById('currentAchievementCoins');
            const currentDesc = document.getElementById('currentAchievementDesc');
            
            // иҺ·еҸ–еҪ“еүҚжңҖй«ҳжҲҗе°?            let currentAchievement = getCoinGameAchievements()[0]; // й»ҳи®Өдё?ж— жүҖдәӢдәӢ"
            for (const achievement of getCoinGameAchievements()) {
                if (coinCount >= achievement.coins) {
                    currentAchievement = achievement;
                }
            }
            
            // жӣҙж–°жҳҫзӨә
            if (currentIcon) currentIcon.textContent = currentAchievement.icon;
            if (currentName) currentName.textContent = currentAchievement.title;
            if (currentCoins) currentCoins.textContent = `${currentAchievement.coins} ${currentLang === 'en' ? 'coins' : 'йҮ‘еёҒ'}`;
            if (currentDesc) currentDesc.textContent = currentAchievement.description;
        }

        // жӣҙж–°жҺҘйҮ‘еёҒжёёжҲҸжҲҗе°ұи§Јй”ҒзҠ¶жҖ?        function updateCoinGameAchievements(coinCount) {
            const achievements = document.querySelectorAll('.game-achievement');
            let highestAchievement = 0;
            
            achievements.forEach(achievement => {
                const requiredCoins = parseInt(achievement.dataset.coins);
                if (coinCount >= requiredCoins) {
                    achievement.classList.add('unlocked');
                    highestAchievement = Math.max(highestAchievement, requiredCoins);
                } else {
                    achievement.classList.remove('unlocked');
                }
            });
            
            // и§Јй”Ғж–°жҲҗе°ұж—¶жҳҫзӨәзү№ж•Ҳ
            if (highestAchievement > localStorage.getItem('highestCoinAchievement') || 0) {
                localStorage.setItem('highestCoinAchievement', highestAchievement);
                createCoinRain(5 + highestAchievement / 10);
                const title = getCurrentTitle(highestAchievement);
                const msg = currentLang === 'en' ? 
                    `рҹҺү New Achievement Unlocked: ${title}` :
                    `рҹҺү и§Јй”Ғж–°жҲҗе°ұпјҡ${title}`;
                showNotification(msg);
            }
        }

        // еҺҹжңүзҡ„йҮ‘еёҒйӣЁеҠҹиғҪ
        class Coin {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = Math.random() * 10 + 15;
                this.speedY = Math.random() * 3 + 2;
                this.speedX = (Math.random() - 0.5) * 2;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.2;
                this.opacity = 1;
                this.collected = false;
                this.walletX = window.innerWidth / 2;
                this.walletY = window.innerHeight - 100;
            }

            update() {
                if (!this.collected) {
                    this.y += this.speedY;
                    this.x += this.speedX;
                    this.rotation += this.rotationSpeed;

                    // йҮҚеҠӣеҠ йҖ?                    this.speedY += 0.1;

                    // жЈҖжҹҘжҳҜеҗҰеҲ°иҫҫй’ұеҢ…дҪҚзҪ?                    if (this.y > this.walletY - 50) {
                        this.collected = true;
                        this.speedY = -2;
                    }
                } else {
                    // йЈһеҗ‘й’ұеҢ…еҠЁз”»
                    const dx = this.walletX - this.x;
                    const dy = this.walletY - this.y;
                    this.x += dx * 0.1;
                    this.y += dy * 0.1;
                    this.opacity -= 0.1;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.opacity;

                // з»ҳеҲ¶3DйҮ‘еёҒ
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.radius);
                gradient.addColorStop(0, '#ffed4a');
                gradient.addColorStop(0.7, '#ffd700');
                gradient.addColorStop(1, '#ff9500');

                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // йҮ‘еёҒиҫ№зјҳ
                ctx.strokeStyle = '#ff9500';
                ctx.lineWidth = 2;
                ctx.stroke();

                // йҮ‘еёҒдёӯеҝғз¬ҰеҸ·
                ctx.fillStyle = '#ff9500';
                ctx.font = `bold ${this.radius}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('ВҘ', 0, 0);

                ctx.restore();
            }
        }

        // еҲӣе»әйҮ‘еёҒйӣ?        function createCoinRain(count = 1) {
            // йҷҗеҲ¶йҮ‘еёҒжҖ»ж•°пјҢйҳІжӯўжҖ§иғҪй—®йўҳ
            const maxCoins = 100;
            const currentCoins = coins.length;
            
            // еҰӮжһңеҪ“еүҚйҮ‘еёҒж•°йҮҸе·Іи¶…иҝҮжңҖеӨ§еҖјпјҢеҮҸе°‘ж–°жҺүиҗҪзҡ„йҮ‘еёҒж•?            let adjustedCount = count;
            if (currentCoins >= maxCoins) {
                adjustedCount = 0;
            } else if (currentCoins + count > maxCoins) {
                adjustedCount = maxCoins - currentCoins;
            }
            
            // еҲӣе»әйҮ‘еёҒ
            for (let i = 0; i < adjustedCount; i++) {
                setTimeout(() => {
                    const x = Math.random() * canvas.width;
                    const y = -50;
                    coins.push(new Coin(x, y));
                }, i * 50);
            }

            if (!animationId) {
                animate();
            }
        }

        // еҠЁз”»еҫӘзҺҜ
        let lastUpdateTime = Date.now();
        
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            coins = coins.filter(coin => coin.opacity > 0);

            let justCollected = false;
            coins.forEach(coin => {
                const wasCollected = coin.collected;
                coin.update();
                coin.draw();

                if (!wasCollected && coin.collected) {
                    justCollected = true;
                }
            });

            if (justCollected) {
                accumulatedCoinCount++;
            }

            // жҜҸж¬ЎйғҪжӣҙж–°зҙҜи®ЎйҮ‘йўқжҳҫзӨәпјҲжҜҸеё§жӣҙж–°пј?            updateCoinCount();
            lastUpdateTime = Date.now();

            if (coins.length > 0) {
                animationId = requestAnimationFrame(animate);
            } else {
                animationId = null;
            }
        }

        // жӣҙж–°зҙҜи®ЎйҮ‘йўқжҳҫзӨәпјҲж №жҚ®еҪ“еүҚйҖүжӢ©зҡ„еҚ•дҪҚиҝӣиЎҢи®Ўз®—пјү
        function updateCoinCount() {
            if (monthlyIncome <= 0 && passiveIncome <= 0) {
                totalCollectedMoney = 0;
            } else {
                // ж №жҚ®еҪ“еүҚйҖүжӢ©зҡ„еҚ•дҪҚи®Ўз®—зҙҜи®ЎйҮ‘йўқпјҲдҪҝз”ЁжңҲи–Ә+иў«еҠЁж”¶е…Ҙпј?                const income = calculateIncome(0);
                const unitState = unitStates[activeUnit];
                const currentTime = Date.now();
                const elapsedTimeInSeconds = (currentTime - unitState.startTime) / 1000;
                
                // ж №жҚ®дёҚеҗҢж—¶й—ҙеҚ•дҪҚи®Ўз®—зҙҜи®ЎйҮ‘йўқпјҢжҜҸдёӘеҚ•дҪҚд»ҺеҜ№еә”зҡ„ж”¶е…ҘйҮ‘йўқејҖе§?                switch(activeUnit) {
                    case 'second':
                        // жҜҸз§’ж”¶е…ҘпјҡеҲқе§ӢдёәжҜҸз§’ж”¶е…ҘпјҢзҙҜи®ЎйҮ‘йўқжҜҸз§’еҸҳеҢ–дёҖж¬ЎпјҲжҜҸз§’ж”¶е…Ҙ Г— з»ҸиҝҮз§’ж•°пј?                        const elapsedSeconds = Math.floor(elapsedTimeInSeconds);
                        totalCollectedMoney = income.second * (elapsedSeconds > 0 ? elapsedSeconds : 1);
                        break;
                    case 'minute':
                        // жҜҸеҲҶй’ҹж”¶е…ҘпјҡеҲқе§ӢдёәжҜҸеҲҶй’ҹж”¶е…ҘпјҢзҙҜи®ЎйҮ‘йўқжҜҸеҲҶй’ҹеҸҳеҢ–дёҖж¬ЎпјҲжҜҸеҲҶй’ҹж”¶е…?Г— з»ҸиҝҮеҲҶй’ҹж•°пјү
                        const elapsedTimeInMinutes = Math.floor(elapsedTimeInSeconds / 60);
                        totalCollectedMoney = income.minute * (elapsedTimeInMinutes > 0 ? elapsedTimeInMinutes : 1);
                        break;
                    case 'hour':
                        // жҜҸе°Ҹж—¶ж”¶е…ҘпјҡеҲқе§ӢдёәжҜҸе°Ҹж—¶ж”¶е…ҘпјҢзҙҜи®ЎйҮ‘йўқжҜҸе°Ҹж—¶еҸҳеҢ–дёҖж¬ЎпјҲжҜҸе°Ҹж—¶ж”¶е…?Г— з»ҸиҝҮе°Ҹж—¶ж•°пјү
                        const elapsedTimeInHours = Math.floor(elapsedTimeInSeconds / 3600);
                        totalCollectedMoney = income.hour * (elapsedTimeInHours > 0 ? elapsedTimeInHours : 1);
                        break;
                    case 'day':
                        // жҜҸж—Ҙж”¶е…ҘпјҡеҲқе§ӢдёәжҜҸж—Ҙж”¶е…ҘпјҢзҙҜи®ЎйҮ‘йўқжҜҸеӨ©еҸҳеҢ–дёҖж¬ЎпјҲжҜҸж—Ҙж”¶е…Ҙ Г— з»ҸиҝҮзҡ„еӨ©ж•°пјү
                        const elapsedTimeInDays = Math.floor(elapsedTimeInSeconds / (3600 * 24));
                        totalCollectedMoney = income.day * (elapsedTimeInDays > 0 ? elapsedTimeInDays : 1);
                        break;
                    case 'week':
                        // жҜҸе‘Ёж”¶е…ҘпјҡеҲқе§ӢдёәжҜҸе‘Ёж”¶е…ҘпјҢзҙҜи®ЎйҮ‘йўқжҜҸе‘ЁеҸҳеҢ–дёҖж¬ЎпјҲжҜҸе‘Ёж”¶е…Ҙ Г— з»ҸиҝҮзҡ„е‘Ёж•°пјү
                        const elapsedTimeInWeeks = Math.floor(elapsedTimeInSeconds / (3600 * 24 * 5));
                        totalCollectedMoney = income.week * (elapsedTimeInWeeks > 0 ? elapsedTimeInWeeks : 1);
                        break;
                }
                
                // дҝқеӯҳеҪ“еүҚеҚ•дҪҚзҡ„зҙҜз§ҜйҮ‘йў?                unitStates[activeUnit].accumulatedMoney = totalCollectedMoney;
            }
            
            const coinDisplay = document.getElementById('coinCount');
            coinDisplay.textContent = totalCollectedMoney.toFixed(4);
            coinDisplay.style.transform = 'scale(1.1)';
            setTimeout(() => {
                coinDisplay.style.transform = 'scale(1)';
            }, 150);
            
            // дҝқеӯҳеҲ°жң¬ең°еӯҳеӮ?            localStorage.setItem('totalCollectedMoney', totalCollectedMoney);
            localStorage.setItem('unitStates', JSON.stringify(unitStates));
        }

        // и®Ўз®—жҖ»ж”¶е…ҘпјҲжңҲи–Ә+иў«еҠЁж”¶е…Ҙпј?        function getTotalMonthlyIncome() {
            return monthlyIncome + passiveIncome;
        }

        // и®Ўз®—еҗ„ж—¶й—ҙж®өж”¶е…Ҙ
        function calculateIncome(monthly) {
            // иҺ·еҸ–е·ҘдҪңеӨ©ж•°е’Ңе·Ҙж—?            const workDaysInput = document.getElementById('workDays');
            const workHoursInput = document.getElementById('workHours');
            const workDays = workDaysInput ? parseFloat(workDaysInput.value) || 5 : 5;
            const workHours = workHoursInput ? parseFloat(workHoursInput.value) || 8 : 8;

            let monthIncome, weekIncome, dayIncome, hourIncome, minuteIncome, secondIncome;

            if (monthlyIncome > 0) {
                // жңүжңҲи–ӘпјҢжӯЈеёёи®Ўз®—
                monthIncome = monthlyIncome + passiveIncome;
                weekIncome = monthIncome / 4.333;
                dayIncome = weekIncome / workDays;
                hourIncome = dayIncome / workHours;
                minuteIncome = hourIncome / 60;
                secondIncome = minuteIncome / 60;
            } else if (passiveIncome > 0) {
                // еҸӘжңүиў«еҠЁж”¶е…Ҙ
                monthIncome = passiveIncome;
                weekIncome = monthIncome / 4.333;
                dayIncome = weekIncome / workDays;
                hourIncome = dayIncome / workHours;
                minuteIncome = hourIncome / 60;
                secondIncome = minuteIncome / 60;
            } else {
                // йғҪжІЎжң?                monthIncome = 0;
                weekIncome = 0;
                dayIncome = 0;
                hourIncome = 0;
                minuteIncome = 0;
                secondIncome = 0;
            }

            return {
                second: secondIncome,
                minute: minuteIncome,
                hour: hourIncome,
                day: dayIncome,
                week: weekIncome,
                month: monthIncome
            };
        }

        // жӣҙж–°жҳҫзӨә
        function updateDisplay(income) {
            document.getElementById('secondValue').textContent = `ВҘ${income.second.toFixed(4)}`;
            document.getElementById('minuteValue').textContent = `ВҘ${income.minute.toFixed(2)}`;
            document.getElementById('hourValue').textContent = `ВҘ${income.hour.toFixed(2)}`;
            document.getElementById('dayValue').textContent = `ВҘ${income.day.toFixed(2)}`;
            document.getElementById('weekValue').textContent = `ВҘ${income.week.toFixed(2)}`;

            // жӣҙж–°жЁЎжӢҹж•°жҚ®пјҲincome.monthе·Із»ҸжҳҜжңҲи–?иў«еҠЁж”¶е…Ҙзҡ„жҖ»е’Ңпј?            document.getElementById('monthSim').textContent = `ВҘ${income.month.toLocaleString()}`;
            document.getElementById('quarterSim').textContent = `ВҘ${(income.month * 3).toLocaleString()}`;
            document.getElementById('halfYearSim').textContent = `ВҘ${(income.month * 6).toLocaleString()}`;
            document.getElementById('yearSim').textContent = `ВҘ${(income.month * 12).toLocaleString()}`;

            // жЈҖжҹҘжҲҗе°?            checkAchievements(income);

            // жЈҖжҹҘзӣ®ж ?            checkGoal(income.month);

            // жӣҙж–°е®һж—¶жҺүиҗҪзҠ¶жҖ?            updateLiveStatus(income);
        }

        // жӣҙж–°е®һж—¶жҺүиҗҪзҠ¶жҖ?        function updateLiveStatus(income) {
            // иҜҘеҮҪж•°е·ІеәҹејғпјҢдҝқз•ҷеҮҪж•°з»“жһ„йҒҝе…ҚжҠҘй”?        }

        // ејҖе§Ӣе®һж—¶йҮ‘еёҒжҺүиҗҪпјҲжүҖжңүеҚ•дҪҚз»ҹдёҖжҜҸз§’йҡҸжңәжҺүиҗҪпј?        function startRealTimeCoinDrop() {
            if (document.hidden) {
                return;
            }

            if (dropInterval) {
                clearInterval(dropInterval);
            }

            // еҰӮжһңжёёжҲҸжӯЈеңЁиҝӣиЎҢпјҢдёҚеҗҜеҠЁж”¶е…ҘйҮ‘еёҒжҺүиҗҪ
            if (gameActive) {
                return;
            }

            if (monthlyIncome <= 0 && passiveIncome <= 0) {
                return;
            }
            
            // йҷҗеҲ¶йҮ‘еёҒжҺүиҗҪпјҢйҳІжӯўжҖ§иғҪй—®йўҳ
            let lastDropTime = 0;
            let isDropping = false;
            
            // жүҖжңүеҚ•дҪҚз»ҹдёҖдёәжҜҸз§’жҺүиҗҪпјҢжҺүиҗҪж•°йҮҸеӣәе®ҡиҢғеӣҙ
            function dropCoins() {
                if (document.hidden) {
                    return;
                }

                // йҳІжӯўйҮҚеӨҚжҺүиҗҪ
                const now = Date.now();
                if (isDropping || now - lastDropTime < 800) {
                    return;
                }
                isDropping = true;
                lastDropTime = now;
                
                // дёҚеҗҢеҚ•дҪҚеҜ№еә”зҡ„еӣәе®ҡжҺүиҗҪж•°йҮҸиҢғеӣ?                const dropRanges = {
                    second: { min: 1, max: 3 },        // жҜҸз§’ж”¶е…ҘпјҡжҜҸз§’йҡҸжңәжҺүиҗ?-3жһҡйҮ‘её?                    minute: { min: 3, max: 6 },       // жҜҸеҲҶй’ҹж”¶е…ҘпјҡжҜҸз§’йҡҸжңәжҺүиҗҪ3-6жһҡйҮ‘её?                    hour: { min: 6, max: 10 },        // жҜҸе°Ҹж—¶ж”¶е…ҘпјҡжҜҸз§’йҡҸжңәжҺүиҗҪ6-10жһҡйҮ‘её?                    day: { min: 10, max: 15 },        // жҜҸж—Ҙж”¶е…ҘпјҡжҜҸз§’йҡҸжңәжҺүиҗ?0-15жһҡйҮ‘её?                    week: { min: 15, max: 22 }       // жҜҸе‘Ёж”¶е…ҘпјҡжҜҸз§’йҡҸжңәжҺүиҗ?5-22жһҡйҮ‘её?                };
                
                const range = dropRanges[activeUnit];
                const coinsToDrop = Math.floor(Math.random() * (range.max - range.min + 1)) + range.min;
                
                // жҜҸз§’жҺүиҗҪйҡҸжңәж•°йҮҸзҡ„йҮ‘еёҒпјҢжңҖеӨ?0жһҡд»ҘдҝқжҢҒжҖ§иғҪ
                createCoinRain(Math.min(coinsToDrop, 30));
                
                // зҹӯжҡӮе»¶иҝҹеҗҺе…Ғи®ёеҶҚж¬ЎжҺүиҗ?                setTimeout(() => {
                    isDropping = false;
                }, 200);
            }
            
            // з«ӢеҚіжү§иЎҢдёҖж¬?            dropCoins();
            
            // и®ҫзҪ®е®ҡж—¶еҷЁпјҢжҜҸз§’жҺүиҗҪйҮ‘еёҒ
            dropInterval = setInterval(dropCoins, 1000);
        }

        // йЎөйқўеҸҜи§ҒжҖ§еҸҳеҢ–еӨ„зҗ?        function handleVisibilityChange() {
            if (document.hidden) {
                if (dropInterval) {
                    clearInterval(dropInterval);
                    dropInterval = null;
                }
            } else {
                startRealTimeCoinDrop();
            }
        }

        document.addEventListener('visibilitychange', handleVisibilityChange);

        // еҲҮжҚўеҚ•дҪҚж—¶йҮҚзҪ®йҮ‘еёҒи®Ўж•?        function resetCoinCountForNewUnit() {
            const income = calculateIncome(0); // дҪҝз”ЁжңҲи–Ә+иў«еҠЁж”¶е…Ҙ
            const unitIncomes = {
                second: income.second,
                minute: income.minute,
                hour: income.hour,
                day: income.day,
                week: income.week
            };
            
            // ж №жҚ®еҪ“еүҚеҚ•дҪҚи®Ўз®—йҮ‘еёҒи®Ўж•°еҹәеҮҶ
            const baseIncome = unitIncomes[activeUnit];
            
            // еҰӮжһңеҪ“еүҚеҚ•дҪҚж”¶е…ҘеӨ§дәҺзӯүдәҺ1пјҢйҮ‘еёҒж•°зӯүдәҺж”¶е…ҘеҖ?            if (baseIncome >= 1) {
                coinCount = Math.floor(baseIncome);
            } else {
                // еҗҰеҲҷд»?ејҖе§Ӣи®Ўж•?                coinCount = 0;
            }
            
            updateCoinCount();
        }

        // жЈҖжҹҘжҲҗе°?- ж №жҚ®еҪ“еүҚиҫ“е…ҘеҖјеҠЁжҖҒжҳҫзӨ?        function checkAchievements(income) {
            const currentPassiveIncome = passiveIncome;
            const totalMonthly = income.month;
            const yearlyIncome = totalMonthly * 12;
            const workDays = parseFloat(document.getElementById('workDays').value) || 5;
            const workHours = parseFloat(document.getElementById('workHours').value) || 8;
            
            const achievements = [
                { id: 'warm-bull', condition: totalMonthly >= 3000 },
                { id: 'formal-bull', condition: totalMonthly >= 5000 },
                { id: 'hour-warm', condition: income.hour >= 20 },
                { id: 'hour-master', condition: income.hour >= 100 },
                { id: 'day-hundred', condition: income.day >= 100 },
                { id: 'day-free', condition: income.day >= 500 },
                { id: 'passive-start', condition: currentPassiveIncome > 0 },
                { id: 'passive-rent', condition: currentPassiveIncome >= 2000 },
                { id: 'extreme-bull', condition: workHours >= 12 },
                { id: 'god-bull', condition: workDays <= 2 },
                { id: 'year-million', condition: yearlyIncome >= 1000000 },
                { id: 'perfect-slacker', condition: income.hour < 20 && currentPassiveIncome > monthlyIncome }
            ];

            // ж”¶йӣҶж–°и§Јй”Ғзҡ„жҲҗе°ұ
            const newUnlocked = [];
            
            achievements.forEach(ach => {
                const element = document.querySelector(`[data-achievement="${ach.id}"]`);
                if (element) {
                    if (ach.condition) {
                        if (!unlockedAchievements.has(ach.id)) {
                            unlockedAchievements.add(ach.id);
                            element.classList.add('unlocked');
                            createCoinRain(10);
                            const achievementName = currentLang === 'zh' ? 
                                element.querySelector('.achievement-name').textContent.split('<br>')[0] : 
                                'Achievement Unlocked!';
                            
                            newUnlocked.push(achievementName);
                        }
                    } else {
                        if (unlockedAchievements.has(ach.id)) {
                            unlockedAchievements.delete(ach.id);
                            element.classList.remove('unlocked');
                        }
                    }
                }
            });
            
            // жҢүйЎәеәҸжҳҫзӨәжҲҗе°ұйҖҡзҹҘ
            if (newUnlocked.length > 0 && !isInitializing) {
                let delay = 2000; // еҲқе§Ӣе»¶иҝҹ2з§?                newUnlocked.forEach((name, index) => {
                    setTimeout(() => {
                        showNotification(currentLang === 'zh' ? `рҹҺү жҒӯе–ңи§Јй”ҒжҲҗе°ұпј?{name}` : `рҹҺү Achievement Unlocked: ${name}`);
                    }, delay + index * 3000); // жҜҸдёӘжҲҗе°ұй—ҙйҡ”3з§?                });
            }
        }

        // йҖҡзҹҘйҳҹеҲ—зі»з»ҹ - жңҖеӨҡеҗҢж—¶жҳҫзӨ?жқЎж¶ҲжҒ?        const notifications = [];
        const messageQueue = [];
        const NOTIFICATION_GAP = 20;
        const NOTIFICATION_HEIGHT = 70;
        const NOTIFICATION_DISPLAY_TIME = 4500;
        const NOTIFICATION_PUSH_DELAY = 600;
        const MAX_VISIBLE_NOTIFICATIONS = 3;

        // жҳҫзӨәйҖҡзҹҘпјҲеҠ е…ҘйҳҹеҲ—пјү
        function showNotification(message) {
            messageQueue.push(message);
            processNotificationQueue();
        }

        // еӨ„зҗҶйҖҡзҹҘйҳҹеҲ—
        function processNotificationQueue() {
            if (notifications.length >= MAX_VISIBLE_NOTIFICATIONS || messageQueue.length === 0) {
                return;
            }
            const message = messageQueue.shift();
            displayNotification(message);
            
            if (messageQueue.length > 0 && notifications.length < MAX_VISIBLE_NOTIFICATIONS) {
                setTimeout(processNotificationQueue, NOTIFICATION_PUSH_DELAY);
            }
        }

        // е®һйҷ…жҳҫзӨәйҖҡзҹҘ
        function displayNotification(message) {
            const notification = document.createElement('div');
            const isMobile = window.innerWidth <= 768;
            
            notification.style.cssText = `
                position: fixed;
                top: -120px;
                left: 50%;
                transform: translateX(-50%);
                background: linear-gradient(135deg, #ffd700, #ff9500);
                color: #1a1a2e;
                padding: 12px 24px;
                border-radius: 12px;
                font-weight: bold;
                z-index: 9999;
                box-shadow: 0 8px 25px rgba(255, 215, 0, 0.7);
                border: 3px solid #fff;
                max-width: ${isMobile ? '85%' : '70%'};
                width: fit-content;
                word-wrap: break-word;
                opacity: 0;
                transition: top 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55), opacity 0.3s ease;
                text-align: center;
                line-height: 1.5;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            notifications.forEach((existingNotification) => {
                const currentTop = parseFloat(existingNotification.style.top) || 20;
                existingNotification.style.top = (currentTop + NOTIFICATION_HEIGHT + NOTIFICATION_GAP) + 'px';
            });
            
            notifications.unshift(notification);
            
            requestAnimationFrame(() => {
                notification.style.opacity = '1';
                notification.style.top = '20px';
            });

            setTimeout(() => {
                notification.style.opacity = '0';
                setTimeout(() => {
                    const index = notifications.indexOf(notification);
                    if (index > -1) {
                        notifications.splice(index, 1);
                    }
                    notification.remove();
                    updateNotificationsPosition();
                    processNotificationQueue();
                }, 300);
            }, NOTIFICATION_DISPLAY_TIME);
        }

        // жӣҙж–°жүҖжңүйҖҡзҹҘдҪҚзҪ®
        function updateNotificationsPosition() {
            notifications.forEach((notification, index) => {
                const targetTop = 20 + index * (NOTIFICATION_HEIGHT + NOTIFICATION_GAP);
                notification.style.top = targetTop + 'px';
                notification.style.left = '50%';
            });
        }

        // ж·»еҠ еҠЁз”»ж ·ејҸ
        const style = document.createElement('style');

async function shareAchievement() {

    // иҺ·еҸ–еҺҶеҸІжңҖй«ҳжҲҗе°?    let highAchievement = getCoinGameAchievements()[0];

    if (!isMobile) {
        if (navigator.share) {
            navigator.share({
                title: currentLang === 'zh' ? 'ж‘ёйұјжёёжҲҸжҲҗе°ұеҲҶдә«' : 'Coin Game Achievement',
                text: text,
                url: pageUrl
            });
        } else {
            navigator.clipboard.writeText(text).then(() => {
                showNotification(currentLang === 'zh' ? 'рҹ“Ӣ й“ҫжҺҘе·ІеӨҚеҲ¶еҲ°еүӘиҙҙжқҝпјҒ' : 'рҹ“Ӣ Link copied to clipboard!');

        }
        return;

    // з§»еҠЁз«Ҝпјҡз”ҹжҲҗе№¶еҲҶдә«еӣҫзү?    const imageDataUrl = generateShareImage(highScore, highAchievement);
    
    // жЈҖжҹҘжҳҜеҗҰж”ҜжҢ?Web Share APIпјҲеёҰж–Үд»¶еҲҶдә«пј?    if (navigator.share && navigator.canShare) {
        try {
            const blob = await fetch(imageDataUrl).then(res => res.blob());
            const file = new File([blob], 'achievement.png', { type: 'image/png' });
            const shareData = {
                title: currentLang === 'zh' ? 'ж‘ёйұјжёёжҲҸжҲҗе°ұеҲҶдә«' : 'Coin Game Achievement',
                text: text,
                url: pageUrl,
                files: [file]
            };
            
            if (navigator.canShare(shareData)) {
                await navigator.share(shareData);
                return;
            }
        } catch (err) {
            console.log('Web Share with files not supported');
        }
    }
    
    // еҫ®дҝЎжөҸи§ҲеҷЁжҲ–дёҚж”ҜжҢҒWeb Shareзҡ„жғ…еҶөпјҡжҸҗзӨәз”ЁжҲ·еӨҚеҲ¶й“ҫжҺҘ
    if (/MicroMessenger/i.test(navigator.userAgent)) {
        navigator.clipboard.writeText(text).then(() => {
            showNotification(currentLang === 'zh' ? 'рҹ“Ӣ й“ҫжҺҘе·ІеӨҚеҲ¶пјҒиҜ·дҪҝз”ЁжөҸи§ҲеҷЁжү“ејҖзҪ‘з«ҷеҲҶдә«еӣҫзүҮ' : 'рҹ“Ӣ Link copied! Please open in browser to share image');
        });
        return;
    }
    
    // е…¶д»–з§»еҠЁз«ҜеӣһйҖҖпјҡеӨҚеҲ¶й“ҫжҺ?    navigator.clipboard.writeText(text).then(() => {
        showNotification(currentLang === 'zh' ? 'рҹ“Ӣ й“ҫжҺҘе·ІеӨҚеҲ¶еҲ°еүӘиҙҙжқҝпјҒ' : 'рҹ“Ӣ Link copied to clipboard!');
    });
}
